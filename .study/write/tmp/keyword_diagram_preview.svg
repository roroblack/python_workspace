<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1020" height="1180" viewBox="0 0 1020 1180"><defs>
        <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
            <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#dbe7ef" stroke-width="1" opacity="0.55"/>
        </pattern>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#8aa3b8" flood-opacity="0.16"/>
        </filter>
        <filter id="shadow-soft" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#8aa3b8" flood-opacity="0.12"/>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#55708a"/>
        </marker>
        </defs><rect width="1020" height="1180" fill="#f7fbfd"/><rect width="1020" height="1180" fill="url(#grid)" opacity="0.9"/><rect x="18" y="18" width="984" height="1144" rx="30" fill="#ffffff" stroke="#d9e4ea" stroke-width="2" filter="url(#shadow)"/><text x="510.0" y="84" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="510.0" dy="0">INNODB SYSTEM ARCHITECTURE OVERVIEW</tspan></text><text x="510.0" y="122" font-size="20" font-weight="600" fill="#475569" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="510.0" dy="0">요청 유입 -&gt; 핵심 처리 -&gt; 메모리 캐시 -&gt; 로그 내구성 -&gt; 영속 스토리지</tspan></text><rect x="415" y="156" width="190" height="30" rx="15" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/><text x="510.0" y="176.0" font-size="14" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="1.2" font-family="Segoe UI, Malgun Gothic, sans-serif">EXTERNAL INGRESS</text><rect x="220" y="196" width="580" height="118" rx="20" fill="#f8fbff" stroke="#2563eb" stroke-width="2" filter="url(#shadow-soft)"/><rect x="220" y="196" width="8" height="118" rx="4" fill="#38bdf8"/><text x="244" y="234" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="244" dy="0">Client Applications / SQL Entry</tspan></text><text x="244" y="266" font-size="18" font-weight="600" fill="#334155" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="244" dy="0">client apps, admin sessions, ORM and JDBC connections</tspan><tspan x="244" dy="24">SELECT, INSERT, UPDATE, COMMIT requests enter through the MySQL protocol</tspan></text><rect x="362" y="350" width="296" height="30" rx="15" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/><text x="510.0" y="370.0" font-size="14" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="1.2" font-family="Segoe UI, Malgun Gothic, sans-serif">CORE PROCESSING SERVICE</text><rect x="220" y="388" width="580" height="448" rx="26" fill="#edf5ff" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/><path d="M 220 414 Q 220 388 246 388 L 774 388 Q 800 388 800 414 L 800 460 L 220 460 Z" fill="#1d4ed8"/><text x="246" y="430" font-size="28" font-weight="800" fill="#ffffff" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="246" dy="0">INNODB CORE STORAGE SERVICE</tspan></text><text x="246" y="452" font-size="15" font-weight="600" fill="#e2e8f0" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="246" dy="0">request routing, page access, cache reuse, and durable commit orchestration</tspan></text><rect x="250" y="480" width="520" height="90" rx="20" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow-soft)"/><rect x="250" y="480" width="8" height="90" rx="4" fill="#60a5fa"/><text x="274" y="518" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="274" dy="0">Request Handler / Access Path Router</tspan></text><text x="274" y="550" font-size="18" font-weight="600" fill="#334155" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="274" dy="0">parses SQL intent and selects clustered / secondary / covering access path</tspan></text><rect x="250" y="592" width="520" height="100" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#shadow-soft)"/><rect x="250" y="592" width="8" height="100" rx="4" fill="#34d399"/><text x="274" y="630" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="274" dy="0">Core Page &amp; Index Manager</tspan></text><text x="274" y="662" font-size="18" font-weight="600" fill="#334155" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="274" dy="0">coordinates page access, B+Tree traversal, insert flow, and split decisions</tspan></text><rect x="250" y="716" width="244" height="108" rx="20" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-soft)"/><rect x="250" y="716" width="8" height="108" rx="4" fill="#6ee7b7"/><text x="274" y="754" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="274" dy="0">Memory Buffer Pool / Cache</tspan></text><text x="274" y="786" font-size="18" font-weight="600" fill="#334155" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="274" dy="0">keeps hot pages in RAM</tspan><tspan x="274" dy="24">cuts random disk I/O and repeat reads</tspan></text><rect x="526" y="716" width="244" height="108" rx="20" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#shadow-soft)"/><rect x="526" y="716" width="8" height="108" rx="4" fill="#86efac"/><text x="550" y="754" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="550" dy="0">Transaction Log Manager</tspan></text><text x="550" y="786" font-size="18" font-weight="600" fill="#334155" text-anchor="start" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="550" dy="0">records redo and commit order</tspan><tspan x="550" dy="24">preserves crash-safe durability</tspan></text><rect x="110" y="892" width="320" height="112" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow-soft)"/><text x="270.0" y="930" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="270.0" dy="0">Concurrency Control</tspan></text><text x="270.0" y="962" font-size="18" font-weight="600" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="270.0" dy="0">MVCC, latches, atomic counters,</tspan><tspan x="270.0" dy="22">and partitioned hot paths</tspan></text><rect x="590" y="892" width="320" height="112" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow-soft)"/><text x="750.0" y="930" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="750.0" dy="0">Backup &amp; Recovery</tspan></text><text x="750.0" y="962" font-size="18" font-weight="600" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="750.0" dy="0">checkpoint, redo replay,</tspan><tspan x="750.0" dy="22">snapshot and restore workflows</tspan></text><rect x="382" y="852" width="256" height="30" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="510.0" y="872.0" font-size="14" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="1.2" font-family="Segoe UI, Malgun Gothic, sans-serif">PERIPHERAL SERVICES</text><rect x="382" y="1026" width="256" height="30" rx="15" fill="#ecfeff" stroke="#99f6e4" stroke-width="1.5"/><text x="510.0" y="1046.0" font-size="14" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="1.2" font-family="Segoe UI, Malgun Gothic, sans-serif">PERSISTENT STORAGE</text><rect x="110" y="1066" width="800" height="116" rx="24" fill="#edf4f7" stroke="#5b7083" stroke-width="2.5" filter="url(#shadow)"/><text x="510.0" y="1106" font-size="28" font-weight="800" fill="#0f172a" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="510.0" dy="0">Persistent Storage (Disk / SSD)</tspan></text><text x="510.0" y="1140" font-size="18" font-weight="600" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif" opacity="1.0"><tspan x="510.0" dy="0">tablespaces, data/index pages, redo files, durable checkpoints</tspan></text><path d="M 510 314 L 510 480" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="434.0" y="332" width="152" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="510" y="351" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">SQL request flow</text><path d="M 510 570 L 510 592" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="446.0" y="568" width="128" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="510" y="587" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">parse / route</text><path d="M 510 692 L 510 704 L 372 704 L 372 716" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="274.0" y="690" width="232" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="390" y="709" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">page access / cache lookup</text><path d="M 510 692 L 510 704 L 648 704 L 648 716" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="538.0" y="690" width="184" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="630" y="709" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">redo / commit record</text><path d="M 270 892 L 270 860 L 360 860 L 360 692" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="252.0" y="836" width="136" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="320" y="855" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">MVCC / latches</text><path d="M 372 824 L 372 900 L 372 1066" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-start="url(#arrow)" marker-end="url(#arrow)"/><rect x="268.0" y="1004" width="208" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="372" y="1023" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">page read / dirty flush</text><path d="M 648 824 L 648 900 L 648 1066" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="516.0" y="1004" width="264" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="648" y="1023" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">redo write / commit durability</text><path d="M 750 892 L 750 860 L 750 1066" fill="none" stroke="#55708a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" marker-start="url(#arrow)" marker-end="url(#arrow)"/><rect x="666.0" y="1004" width="168" height="28" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="750" y="1023" font-size="14" font-weight="700" fill="#334155" text-anchor="middle" font-family="Segoe UI, Malgun Gothic, sans-serif">snapshot / restore</text></svg>